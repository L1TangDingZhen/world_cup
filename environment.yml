name: WC
channels:
  - defaults
dependencies:
  - python=3.12
  - pip
  - pip:
      # bayes pulls in PyMC + ArviZ for the hierarchical model.
      # GPU support is installed separately: first the PyTorch CUDA wheel
      # matching the local driver, then `pip install -e ".[gpu]"`.
      - -e .[dev,bayes]
