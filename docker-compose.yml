services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: worldcup
      POSTGRES_PASSWORD: worldcup
      POSTGRES_DB: worldcup
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build: .
    command: uvicorn worldcup_predictor.api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      CELERY_ASYNC_ENABLED: "true"
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    volumes:
      - .:/app
    depends_on:
      - postgres
      - redis

  worker:
    build: .
    command: celery -A worldcup_predictor.tasks.celery_app worker --loglevel=info
    volumes:
      - .:/app
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      WORLDCUP_DATABASE_URL: postgresql+psycopg://worldcup:worldcup@postgres:5432/worldcup
      API_FOOTBALL_KEY: ${API_FOOTBALL_KEY:-}
      API_FOOTBALL_SYNC_ENABLED: ${API_FOOTBALL_SYNC_ENABLED:-false}
    depends_on:
      - redis
      - postgres

  beat:
    build: .
    command: celery -A worldcup_predictor.tasks.celery_app beat --loglevel=info
    volumes:
      - .:/app
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      WORLDCUP_DATABASE_URL: postgresql+psycopg://worldcup:worldcup@postgres:5432/worldcup
      API_FOOTBALL_KEY: ${API_FOOTBALL_KEY:-}
      API_FOOTBALL_SYNC_ENABLED: ${API_FOOTBALL_SYNC_ENABLED:-false}
    depends_on:
      - redis
      - postgres

  dashboard:
    build: .
    command: streamlit run app/dashboard.py --server.address 0.0.0.0 --server.port 8501
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    depends_on:
      - api

volumes:
  postgres-data:
